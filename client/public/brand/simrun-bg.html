<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>simrun — background</title>
  <style>
    /* Demo wrapper only — remove when integrating */
    html, body { margin: 0; padding: 0; height: 100%; background: #000; }
    .demo-frame { width: 100vw; height: 100vh; }

    /* ============ COMPONENT START ============ */
    /* Drop the .simrun-bg element wherever you want the background.
       It fills its parent. Recommended: position it absolute behind your content,
       or use it as a section/page background. */

    .simrun-bg {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #0a1612 0%, #03060a 75%);
      overflow: hidden;
    }

    .simrun-bg__stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .simrun-bg__stars span {
      position: absolute;
      background: #aaffb5;
      border-radius: 50%;
      opacity: 0.15;
      animation: simrun-twinkle 4s ease-in-out infinite;
    }

    @keyframes simrun-twinkle {
      0%, 100% { opacity: 0.12; }
      50%      { opacity: 0.55; }
    }
    /* ============ COMPONENT END ============ */
  </style>
</head>
<body>
  <div class="demo-frame">
    <!-- ============ COMPONENT MARKUP START ============ -->
    <div class="simrun-bg">
      <div class="simrun-bg__stars"></div>
    </div>
    <!-- ============ COMPONENT MARKUP END ============ -->
  </div>

  <script>
    /* ============ COMPONENT SCRIPT START ============ */
    /* Spawns 70 small star <span>s with randomized position, size, and twinkle
       timing. Pure CSS animation drives the twinkle — no animation library needed. */
    (function () {
      document.querySelectorAll('.simrun-bg__stars').forEach(function (host) {
        if (host.children.length) return;
        for (var i = 0; i < 70; i++) {
          var s = document.createElement('span');
          var sz = (Math.random() * 1.4 + 0.5).toFixed(2);
          s.style.left = (Math.random() * 100) + '%';
          s.style.top = (Math.random() * 100) + '%';
          s.style.width = sz + 'px';
          s.style.height = sz + 'px';
          s.style.animationDelay = (Math.random() * 4).toFixed(2) + 's';
          s.style.animationDuration = (Math.random() * 2 + 2).toFixed(2) + 's';
          host.appendChild(s);
        }
      });
    })();
    /* ============ COMPONENT SCRIPT END ============ */
  </script>
</body>
</html>
