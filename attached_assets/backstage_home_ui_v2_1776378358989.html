
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2rem;">
<div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.75rem; max-width: 560px; margin: 0 auto;">

  <div style="margin-bottom: 1.5rem;">
    <div style="font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px;">Your hook</div>
    <textarea rows="4" placeholder="Describe your opening line or video concept — e.g. &quot;I tried every viral breakfast hack so you don't have to…&quot;" style="width: 100%; resize: none; font-size: 14px; padding: 10px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); box-sizing: border-box; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-primary);"></textarea>
    <div style="font-size: 12px; color: var(--color-text-tertiary); margin-top: 4px;">Write it like you'd actually say it on camera.</div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
    <div>
      <div style="font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px;">Platform</div>
      <select style="width: 100%; font-size: 14px;">
        <option value="" disabled selected>Select platform</option>
        <option>TikTok</option>
        <option>Instagram</option>
        <option>YouTube</option>
      </select>
    </div>
    <div>
      <div style="font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px;">Content category</div>
      <select style="width: 100%; font-size: 14px;">
        <option value="" disabled selected>Select category</option>
        <optgroup label="Entertainment">
          <option>🎭 Cosplay</option>
          <option>💃 Dance</option>
          <option>🎵 Music</option>
          <option>🎤 Vocal / Singing</option>
          <option>😂 Comedy &amp; Pranks</option>
          <option>🎬 Film &amp; TV</option>
          <option>⚽ Sports</option>
        </optgroup>
        <optgroup label="Style &amp; Beauty">
          <option>👗 Fashion</option>
          <option>💄 Beauty &amp; Makeup</option>
          <option>💪 Fitness</option>
          <option>🧘 Self-Care &amp; Wellness</option>
        </optgroup>
        <optgroup label="Gaming &amp; Culture">
          <option>🎮 Gaming</option>
          <option>🌸 Anime &amp; Manga</option>
          <option>🎯 K-pop</option>
        </optgroup>
        <optgroup label="Identity &amp; Culture">
          <option>🌎 Latino</option>
          <option>🌏 Asian</option>
          <option>✊ Black</option>
          <option>🏳️‍🌈 LGBTQ+</option>
        </optgroup>
        <optgroup label="Lifestyle">
          <option>🌿 Lifestyle &amp; Vlog</option>
          <option>🎒 Travel</option>
          <option>🍳 Food &amp; Cooking</option>
          <option>🐾 Pets</option>
          <option>👶 Parenting &amp; Family</option>
        </optgroup>
        <optgroup label="Creative &amp; Education">
          <option>🎨 Art &amp; Design</option>
          <option>✂️ DIY &amp; Crafts</option>
          <option>📚 Books &amp; Reading</option>
          <option>💡 Advice &amp; Education</option>
          <option>🌱 Plants &amp; Nature</option>
        </optgroup>
        <option>＋ Other</option>
      </select>
    </div>
  </div>

  <div style="margin-bottom: 1.75rem;">
    <div style="font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px;">Hashtag</div>
    <input type="text" placeholder="#foodtok, #grwm, #gamingsetup" style="width: 100%; font-size: 14px; box-sizing: border-box;" />
    <div style="font-size: 12px; color: var(--color-text-tertiary); margin-top: 4px;">Add 1–3 tags your audience would actually search.</div>
  </div>

  <button style="width: 100%; padding: 10px; font-size: 14px; font-weight: 500; background: #1a1a1a; color: #fff; border: none; border-radius: var(--border-radius-md); cursor: pointer;">Analyze my hook</button>

</div>
</div>
